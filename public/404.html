<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Sayfa Bulunamadı | Hadi Barışalım</title>
<meta name="description" content="Aradığınız sayfa bulunamadı.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,480&family=Karla:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #231117;
    --gold: #C9A15B;
    --gold-bright: #E7C685;
    --rose: #E3AFB0;
    --text: #F2E9E4;
    --text-muted: #B7A6AE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(69, 33, 44, 0.7) 0%, transparent 60%),
      radial-gradient(circle at 85% 100%, rgba(48, 23, 31, 0.6) 0%, transparent 60%);
    color: var(--text);
    font-family: 'Karla', -apple-system, BlinkMacSystemFont, sans-serif;
    text-align: center;
    padding: 2rem;
  }
  .error-code {
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(5rem, 15vw, 10rem);
    font-weight: 480;
    font-style: italic;
    color: var(--gold);
    line-height: 1;
    opacity: 0.3;
    margin-bottom: -0.5rem;
  }
  .error-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 480;
    color: var(--text);
    margin-bottom: 1rem;
  }
  .error-desc {
    color: var(--text-muted);
    font-size: 1rem;
    max-width: 40ch;
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: 999px;
    padding: 0.85rem 2rem;
    font-family: 'Karla', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .back-btn:hover {
    background: var(--gold-bright);
    transform: translateY(-2px);
  }
  .envelope-icon {
    font-size: 2.5rem;
    margin-bottom: 1.5rem;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
</style>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="error-code">404</div>
  <div class="envelope-icon">📭</div>
  <h1 class="error-title">Bu mektup kaybolmuş</h1>
  <p class="error-desc">Aradığınız sayfa bulunamadı. Belki yanlış bir adres girdiniz veya sayfa taşınmış olabilir.</p>
  <a href="/" class="back-btn">← Ana Sayfaya Dön</a>
</body>
</html>
